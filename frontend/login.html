<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to CampusConnect — Access your campus event dashboard.">
    <title>Login — CampusConnect</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ── Navbar ── -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <span class="logo-icon">C</span>
            CampusConnect
        </a>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="register.html" class="btn-nav-primary">Sign Up</a></li>
        </ul>
    </nav>

    <!-- ── Login Form ── -->
    <main class="main-content">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Welcome back</h2>
                <p class="subtitle">Login to access your dashboard</p>

                <div class="alert alert-error" id="alertError"></div>
                <div class="alert alert-success" id="alertSuccess"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="you@university.edu" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter your password"
                            required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="loginBtn">Login</button>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="register.html">Create one</a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        // Mobile toggle
        document.getElementById('navToggle').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('active');
        });

        // Redirect if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
