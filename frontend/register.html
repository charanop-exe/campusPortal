<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a CampusConnect account — Sign up as Admin, Faculty, or Student.">
    <title>Register — CampusConnect</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ── Navbar ── -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <span class="logo-icon">C</span>
            CampusConnect
        </a>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html" class="btn-nav-primary">Login</a></li>
        </ul>
    </nav>

    <!-- ── Register Form ── -->
    <main class="main-content">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Create Account</h2>
                <p class="subtitle">Join CampusConnect today</p>

                <div class="alert alert-error" id="alertError"></div>
                <div class="alert alert-success" id="alertSuccess"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="you@university.edu" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Min. 6 characters"
                            required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="role">I am a...</label>
                        <select id="role" class="form-control" required>
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" id="registerBtn">Create Account</button>
                </form>

                <div class="auth-footer">
                    Already have an account? <a href="login.html">Login</a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        // Mobile toggle
        document.getElementById('navToggle').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('active');
        });

        // Redirect if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
